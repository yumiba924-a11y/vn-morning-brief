name: morning-brief

on:
  schedule:
    # 平日 08:00 JST に実行 = 前日 23:00 UTC（JST月〜金＝UTC日〜木）。
    # 出社時には机にある想定。VNオープン(11:00 JST)まで3時間の余裕。
    - cron: "0 23 * * 0-4"
  workflow_dispatch: {}   # 手動実行ボタンも有効化（テスト用）

permissions:
  contents: write         # 生成HTMLをリポジトリにコミットするため

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build & send brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: python scripts/build_brief.py

      - name: Commit HTML archive
        run: |
          git config user.name  "morning-brief-bot"
          git config user.email "actions@github.com"
          git add output/ docs/ social_history/covered.jsonl
          git commit -m "brief: $(TZ=Asia/Tokyo date +%Y-%m-%d)" || { echo "no changes"; exit 0; }
          # 手動push/他ワークフローとの競合に強く（rebase＋最大3回リトライ）
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 5
          done
