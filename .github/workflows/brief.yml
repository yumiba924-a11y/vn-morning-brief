name: morning-brief

on:
  schedule:
    # ★GitHubのcronは2〜3時間遅延する実測。8:00 JST着を狙い"早出し"で吸収する。
    # 20:00 UTC = 定刻なら5:00 JST／+3h遅延でも8:00 JST。中身は昨日終値＋前夜の海外で早出し可。
    # (JST月〜金 = UTC日〜木)
    - cron: "0 20 * * 0-4"
  workflow_dispatch: {}   # 手動実行ボタンも有効化（テスト用）

permissions:
  contents: write         # 生成HTMLをリポジトリにコミットするため

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build & send brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: python scripts/build_brief.py

      - name: Commit HTML archive
        run: |
          git config user.name  "morning-brief-bot"
          git config user.email "actions@github.com"
          git add output/ docs/ social_history/covered.jsonl
          git commit -m "brief: $(TZ=Asia/Tokyo date +%Y-%m-%d)" || { echo "no changes"; exit 0; }
          # 手動push/他ワークフローとの競合に強く（rebase＋最大3回リトライ）
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 5
          done
