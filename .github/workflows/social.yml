name: social-collector

# ソーシャル収集（Tier2バズのベースライン蓄積用）＝2ソース: FireAnt ＋ F247。
# 依存ゼロ・Secrets不要（FireAntは公開トークン同梱・F247は認証不要）。
# 毎営業日 VN 市場クローズ後に走らせ、日次バズ件数を social_history/ に貯める。

on:
  schedule:
    # 平日 09:00 UTC = 16:00 ICT（VN大引け15:00の直後） = 18:00 JST
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}   # 手動実行ボタン（テスト用）

permissions:
  contents: write         # 履歴CSVをコミットするため

concurrency:
  group: social-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 標準ライブラリのみ＝ pip install 不要。対象は VN100（config/universe.csv）
      - name: Collect FireAnt social (quality + volume)
        run: |
          python scripts/social_collector.py \
            --symbols-file config/universe.csv \
            --hours 24 --max-pages 3 \
            --history social_history/buzz_daily.csv \
            --outdir social_out

      # 第2ソース：F247(Discourse) を ticker タグで銘柄別収集
      - name: Collect F247 social
        run: |
          python scripts/f247_collector.py \
            --symbols-file config/universe.csv \
            --hours 24 \
            --history social_history/buzz_f247_daily.csv \
            --outdir social_out

      # Foreign Room（外国人保有余力）＋外人フロー を VCI(Vietcap) から収集。
      # vnstock依存のため個別pip install。失敗してもバズ収集は止めない(continue-on-error)。
      - name: Collect Foreign Room & flow (VCI)
        continue-on-error: true
        run: |
          pip install --quiet vnstock pandas feedparser
          python scripts/room_collector.py \
            --symbols-file config/universe.csv \
            --history social_history/room_daily.csv \
            --outdir social_out

      # ±ブレイク自動解剖（大引け後・price_board 1コールでその日の犯人＋外人＋Room）。
      - name: Break decomposition (culprit + foreign + room)
        continue-on-error: true
        run: |
          python scripts/breakdown.py --outdir social_history

      # VN100注目度モニター（別紙）を docs/index.html に生成（メディア言及取得にfeedparser）
      - name: Build VN100 monitor
        run: |
          pip install --quiet feedparser
          python scripts/social_view.py

      # 観察ビューをメール送信（朝ブリーフと同じSMTPを使い回し・未登録なら自動スキップ）
      - name: Email observation view
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: python scripts/send_view.py

      # 生投稿は日次アーカイブとして Artifact 保管（repoは膨らませない・90日保持）
      - name: Archive raw posts
        uses: actions/upload-artifact@v4
        with:
          name: social-posts-${{ github.run_id }}
          path: |
            social_out/social_posts.jsonl
            social_out/f247_topics.jsonl
          retention-days: 90

      - name: Commit history & view
        run: |
          git config user.name  "social-collector-bot"
          git config user.email "actions@github.com"
          git add social_history/ output/ docs/
          git commit -m "social: buzz $(TZ=Asia/Ho_Chi_Minh date +%Y-%m-%d)" || { echo "no changes"; exit 0; }
          # 手動push/他ワークフローとの競合に強く（rebase＋最大3回リトライ）
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 5
          done
